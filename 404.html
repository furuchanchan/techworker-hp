<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ページが見つかりません（404） — TechWorker</title>
<meta name="robots" content="noindex,follow">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0D1117; --paper:#F4F6F9;
  --electric:#005EFF; --electric-dark:#003DAA;
  --slate:#4A5568; --line-2:#D5DAE2;
  --jp:'IBM Plex Sans JP','IBM Plex Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--jp);background-color:var(--paper);background-image:repeating-linear-gradient(0deg,rgba(13,17,23,.04) 0 1px,transparent 1px 40px),repeating-linear-gradient(90deg,rgba(13,17,23,.04) 0 1px,transparent 1px 40px);color:var(--ink);line-height:1.85;font-size:16px;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
::selection{background:var(--electric);color:var(--paper);}
.wrap{max-width:560px;width:100%;}
.code{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.14em;color:var(--electric);border-left:3px solid var(--electric);padding-left:14px;}
h1{font-weight:700;font-size:clamp(24px,4.6vw,34px);line-height:1.4;letter-spacing:-.02em;margin:20px 0 14px;}
p{color:var(--slate);font-size:15px;margin-bottom:34px;}
.btns{display:flex;gap:14px;flex-wrap:wrap;}
.btn{font-family:var(--jp);font-size:14.5px;font-weight:600;color:var(--paper);background:var(--electric);text-decoration:none;border-radius:5px;padding:14px 26px;display:inline-flex;align-items:center;gap:10px;transition:background .25s,transform .25s;}
.btn:hover{background:var(--electric-dark);transform:translateY(-1px);}
.btn--ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line-2);}
.btn--ghost:hover{border-color:var(--electric);color:var(--electric);background:transparent;}
.links{margin-top:38px;padding-top:24px;border-top:1px solid var(--line-2);font-size:14px;}
.links a{color:var(--slate);text-decoration:none;margin-right:20px;}
.links a:hover{color:var(--electric);}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404 NOT FOUND</div>
  <h1>お探しのページは見つかりませんでした。</h1>
  <p>URLが変更されたか、ページが削除された可能性があります。お手数ですが、トップページまたは下記のリンクからお探しください。</p>
  <div class="btns">
    <a class="btn" href="/">トップページへ &rarr;</a>
    <a class="btn btn--ghost" href="/contact">お問い合わせ</a>
  </div>
  <div class="links">
    <a href="/services">サービス</a>
    <a href="/training">法人研修</a>
    <a href="/cases">実績・事例</a>
    <a href="/media/">メディア</a>
    <a href="/company">会社概要</a>
  </div>
</div>
</body>
</html>
