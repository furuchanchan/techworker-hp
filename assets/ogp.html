<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Noto+Sans+JP:wght@800&display=swap" rel="stylesheet">
<style>
body { margin: 0; width: 1200px; height: 630px; display: flex; background: #005EFF; font-family: 'Plus Jakarta Sans','Noto Sans JP',sans-serif; overflow: hidden; }
.left { width: 50%; display: flex; flex-direction: column; justify-content: center; padding: 60px 80px; color: #F4F6F9; }
.logo { font-size: 28px; font-weight: 800; margin-bottom: 40px; letter-spacing: -0.5px; }
.logo span { opacity: .7; }
h1 { font-size: 48px; font-weight: 800; line-height: 1.3; }
h1 em { font-style: normal; color: #F4F6F9; text-decoration: underline; text-decoration-color: rgba(244,246,249,.3); text-underline-offset: 8px; }
.sub { font-size: 18px; margin-top: 20px; opacity: .6; }
.right { width: 50%; background: #F4F6F9; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 24px; clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%); }
.kpi { display: flex; gap: 40px; }
.kpi-item { text-align: center; }
.kpi-item .num { font-size: 56px; font-weight: 800; color: #005EFF; line-height: 1; }
.kpi-item .label { font-size: 13px; color: #3C4B64; font-weight: 600; margin-top: 4px; }
.tagline { font-size: 14px; color: #3C4B64; font-weight: 600; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="left">
  <div class="logo">Tech<span>Worker</span></div>
  <h1>AIは<em>エンジン</em>だ。<br>コンテキストは<br><em>燃料</em>だ。</h1>
  <p class="sub">Enterprise AI Consulting</p>
</div>
<div class="right">
  <div class="kpi">
    <div class="kpi-item"><div class="num">37</div><div class="label">支援企業</div></div>
    <div class="kpi-item"><div class="num">2,500</div><div class="label">研修受講者</div></div>
  </div>
  <div class="tagline">techworker.co.jp</div>
</div>
</body></html>
